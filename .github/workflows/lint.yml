name: Lint

on:
  push:
    branches:
      - main
    tags: ["v*"]
    paths:
      - "app/**"
      - "tests/**"
      - "alembic/**"
      - "ruff.toml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "alembic/**"
      - "ruff.toml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt mypy

      - name: Type check
        run: mypy app --ignore-missing-imports --no-strict-optional
