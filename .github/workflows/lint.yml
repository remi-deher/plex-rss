name: Lint

on:
  push:
    branches:
      - main
    tags: ["v*"]
    paths:
      - "app/**"
      - "tests/**"
      - "alembic/**"
      - "ruff.toml"
      - "frontend/**"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "alembic/**"
      - "ruff.toml"
      - "frontend/**"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint
        # Import/whitespace cleanup is adopted progressively on the legacy modules.
        run: ruff check . --ignore I001,W293,E702

      - name: Format check
        run: >-
          ruff format --check
          app/job_queue.py app/jobs.py app/realtime.py app/routers/events_api.py
          tests/test_jobs_realtime.py

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Type check
        run: >-
          mypy app/job_queue.py app/jobs.py app/realtime.py app/routers/events_api.py
          --ignore-missing-imports --no-strict-optional --follow-imports=skip
