name: Lint

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "alembic/**"
      - "ruff.toml"
  pull_request:
    paths:
      - "app/**"
      - "alembic/**"
      - "ruff.toml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .
