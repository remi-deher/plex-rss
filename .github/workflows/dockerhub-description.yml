name: Update Docker Hub description

on:
  push:
    branches:
      - main
    paths:
      - DOCKER_HUB.md

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: mrcryllix/plex-rss
          readme-filepath: ./DOCKER_HUB.md
          short-description: "Self-hosted Plex request and availability hub for Sonarr, Radarr, downloads, VO/VF tracking and grouped notifications"
