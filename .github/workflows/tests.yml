name: Unit Tests

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: python -m pytest -v --cov=app --cov-report=term-missing --cov-fail-under=60
