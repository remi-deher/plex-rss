name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest -v
