name: Dependency audit

on:
  push:
    branches: [main]
    paths:
      - "requirements*.txt"
      - "package*.json"
      - ".github/workflows/dependency-audit.yml"
  pull_request:
    paths:
      - "requirements*.txt"
      - "package*.json"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pip-audit
      - run: pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
