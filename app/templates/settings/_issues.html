<div class="tab-pane fade" id="tab-issues" role="tabpanel">
  <div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0"><i class="bi bi-flag text-warning me-2"></i>Signalements de Problèmes Média</h5>
      <div class="btn-group btn-group-sm" role="group">
        <input type="radio" class="btn-check" name="issueStatusFilter" id="issue-filter-open" value="open" checked onchange="loadIssues()">
        <label class="btn btn-outline-warning" for="issue-filter-open">Ouverts</label>

        <input type="radio" class="btn-check" name="issueStatusFilter" id="issue-filter-investigating" value="investigating" onchange="loadIssues()">
        <label class="btn btn-outline-warning" for="issue-filter-investigating">En cours</label>

        <input type="radio" class="btn-check" name="issueStatusFilter" id="issue-filter-resolved" value="resolved" onchange="loadIssues()">
        <label class="btn btn-outline-warning" for="issue-filter-resolved">Résolus</label>

        <input type="radio" class="btn-check" name="issueStatusFilter" id="issue-filter-closed" value="closed" onchange="loadIssues()">
        <label class="btn btn-outline-warning" for="issue-filter-closed">Fermés</label>

        <input type="radio" class="btn-check" name="issueStatusFilter" id="issue-filter-all" value="" onchange="loadIssues()">
        <label class="btn btn-outline-warning" for="issue-filter-all">Tous</label>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-dark table-striped align-middle mb-0" id="issues-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Média</th>
            <th>Type</th>
            <th>Signalé par</th>
            <th>Problème</th>
            <th>Notes Admin</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="issues-list">
          <tr>
            <td colspan="7" class="text-center py-4 text-muted">
              Chargement des signalements...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Edition Signalement -->
<div class="modal fade" id="issueEditModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:var(--pr-surface);border:1px solid var(--pr-border)">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Gérer le signalement</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fermer"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-issue-id">
        <div class="mb-3">
          <label for="edit-issue-status" class="form-label">Statut</label>
          <select class="form-select" id="edit-issue-status">
            <option value="open">Ouvert</option>
            <option value="investigating">En cours d'investigation</option>
            <option value="resolved">Résolu</option>
            <option value="closed">Fermé</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="edit-issue-note" class="form-label">Note Administrateur</label>
          <textarea class="form-control" id="edit-issue-note" rows="4" placeholder="Détaillez les actions entreprises, ou note pour plus tard..."></textarea>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-warning" onclick="saveIssueChanges()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
