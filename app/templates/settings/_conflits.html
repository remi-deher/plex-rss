<div class="tab-pane fade" id="tab-conflits" role="tabpanel">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="mb-0"><i class="bi bi-exclamation-triangle text-warning me-2"></i>Conflits de déduplication</h5>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-warning" id="btn-auto-resolve" onclick="autoResolveAll(this)">
          <i class="bi bi-magic me-1"></i>Tout résoudre automatiquement
        </button>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadConflicts()">
          <i class="bi bi-arrow-clockwise me-1"></i>Rafraîchir
        </button>
      </div>
    </div>

    <div id="conflicts-loading" class="text-center text-muted py-5 d-none">
      <div class="spinner-border spinner-border-sm me-2"></div>Chargement…
    </div>

    <!-- 1. Conflits tmdb -->
    <div id="section-tmdb-conflicts" class="d-none mb-4">
      <h6 class="text-uppercase text-muted mb-3" style="font-size:11px;letter-spacing:.08em">
        <i class="bi bi-intersect me-1"></i>Conflits tmdb_id — même série, identifiants différents
      </h6>
      <div id="tmdb-conflicts-list"></div>
    </div>

    <!-- 2. Demandes orphelines -->
    <div id="section-orphaned" class="mb-4 d-none">
      <h6 class="text-uppercase text-muted mb-3" style="font-size:11px;letter-spacing:.08em">
        <i class="bi bi-person-x me-1"></i>Demandes orphelines — utilisateur supprimé
      </h6>
      <div class="table-responsive">
        <table class="table table-sm table-dark align-middle mb-0">
          <thead><tr><th>Titre</th><th>Type</th><th>Utilisateur (ID)</th><th>Statut</th><th>Date</th><th></th></tr></thead>
          <tbody id="orphaned-body"></tbody>
        </table>
      </div>
    </div>

    <!-- 4. En attente trop longtemps -->
    <div id="section-long-pending" class="mb-4 d-none">
      <h6 class="text-uppercase text-muted mb-3" style="font-size:11px;letter-spacing:.08em">
        <i class="bi bi-hourglass-split me-1"></i>En attente depuis plus de 30 jours
      </h6>
      <div class="table-responsive">
        <table class="table table-sm table-dark align-middle mb-0">
          <thead><tr><th>Titre</th><th>Type</th><th>Utilisateur</th><th>Source</th><th>Ancienneté</th><th></th></tr></thead>
          <tbody id="long-pending-body"></tbody>
        </table>
      </div>
    </div>

    <div id="conflicts-empty" class="text-center text-muted py-5 d-none">
      <i class="bi bi-check-circle text-success fs-3 d-block mb-2"></i>
      Aucun conflit détecté.
    </div>
  </div
