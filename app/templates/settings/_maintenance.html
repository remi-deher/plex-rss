<div class="tab-pane fade" id="tab-maintenance" role="tabpanel">

<style>
.maint-card {
  background:var(--pr-surface);border:1px solid var(--pr-border);border-radius:8px;
  transition:border-color .2s,box-shadow .2s;cursor:pointer;
}
.maint-card:hover { border-color:var(--pr-text-muted);box-shadow:0 0 0 1px var(--pr-text-muted); }
.maint-card.running { border-color:#0d6efd55; }
.maint-card.done    { border-color:#19875455; }
.maint-card.error   { border-color:#dc354555; }
.maint-log {
  font-family:monospace;font-size:12px;line-height:1.6;
  background:var(--pr-surface-2);border-radius:4px;padding:10px;max-height:260px;
  overflow-y:auto;white-space:pre-wrap;word-break:break-word;
}
.maint-log .log-ok   { color:#4ade80; }
.maint-log .log-warn { color:#fbbf24; }
.maint-log .log-err  { color:#f87171; }
.maint-log .log-info { color:#9ca3af; }
</style>

<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 p-1 mb-3"
     style="background:var(--pr-surface);border:1px solid var(--pr-border);border-radius:8px;padding:16px !important;">
  <div>
    <div style="font-weight:600;color:var(--pr-text);"><i class="bi bi-compass me-1"></i> Assistant de configuration</div>
    <small class="text-muted">Reparcourir la configuration guidée (Plex, *arr, passerelle, VFF, notifications). Vos réglages actuels sont pré-remplis et conservés.</small>
  </div>
  <a href="/setup/wizard" class="btn btn-warning btn-sm">
    <i class="bi bi-magic me-1"></i> Lancer l'assistant
  </a>
</div>

<div class="row g-3 p-1" id="maint-grid"></div>

  </div>
