{% extends "base.html" %}
{% set page = "calendar" %}
{% block content %}

<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
  <div>
    <h2 class="mb-0"><i class="bi bi-calendar3 me-2 text-warning"></i>Calendrier</h2>
    <div class="text-muted small mt-1">Sorties films et diffusions d'épisodes (Sonarr / Radarr)</div>
  </div>
  <div class="d-flex align-items-center gap-2">
    <div class="form-check form-switch m-0">
      <input class="form-check-input" type="checkbox" id="cal-tracked-only" onchange="loadCalendar()">
      <label class="form-check-label small text-muted" for="cal-tracked-only">Suivis uniquement</label>
    </div>
    <span id="cal-updated" class="text-muted small"></span>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadCalendar()"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
</div>

<div class="text-center mb-3">
  <button type="button" class="btn btn-sm btn-outline-secondary" id="cal-prev-month-btn" onclick="loadCalendar(true)">
    <i class="bi bi-chevron-up me-1"></i>Voir le mois précédent
  </button>
</div>

<div id="cal-container">
  <div class="text-center text-muted py-5"><span class="spinner-border text-warning"></span></div>
</div>

<div class="text-center mt-3">
  <button type="button" class="btn btn-sm btn-outline-secondary" id="cal-next-month-btn" onclick="loadCalendar(false, true)">
    <i class="bi bi-chevron-down me-1"></i>Voir le mois suivant
  </button>
</div>

{% endblock %}

{% block scripts %}
<script>
function escHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

function dayLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  const weekday = d.toLocaleDateString('fr-FR', { weekday: 'long' });
  const full = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined });
  if (diffDays === 0) return `Aujourd'hui — ${full}`;
  if (diffDays === 1) return `Demain — ${full}`;
  if (diffDays === -1) return `Hier — ${full}`;
  return `${weekday.charAt(0).toUpperCase() + weekday.slice(1)} ${full}`;
}

// Code couleur par type de sortie (cinéma / digitale / physique / épisode).
function releaseMeta(e) {
  if (e.type === 'episode') return { color: '#0dcaf0', icon: 'bi-tv', label: 'Série', dark: true };
  switch (e.release_type) {
    case 'cinema':   return { color: '#e5a00d', icon: 'bi-camera-reels', label: 'Cinéma',   dark: true };
    case 'digital':  return { color: '#0d6efd', icon: 'bi-laptop',       label: 'Digital',  dark: false };
    case 'physical': return { color: '#6f42c1', icon: 'bi-disc',         label: 'Physique', dark: false };
    default:         return { color: '#0d6efd', icon: 'bi-film',         label: 'Film',     dark: false };
  }
}

function renderEvent(e) {
  const isPast = new Date(e.date) < new Date();
  const m = releaseMeta(e);
  const typeBadge = `<span class="badge" style="font-size:9px;background:${m.color};color:${m.dark ? '#141414' : '#fff'}"><i class="bi ${m.icon} me-1"></i>${m.label}</span>`;
  const trackedBadge = e.tracked ? '<span class="badge bg-warning text-dark" style="font-size:9px"><i class="bi bi-bookmark-star-fill me-1"></i>Suivi</span>' : '';
  const fileBadge = e.has_file
    ? '<span class="badge badge-available" style="font-size:9px"><i class="bi bi-check-circle-fill me-1"></i>Disponible</span>'
    : (isPast ? '<span class="badge badge-pending" style="font-size:9px"><i class="bi bi-hourglass-split me-1"></i>En attente</span>' : '');
  const poster = e.poster_url
    ? `<img src="${escHtml(e.poster_url)}" style="width:40px;height:60px;object-fit:cover;border-radius:4px" alt="">`
    : `<div style="width:40px;height:60px;border-radius:4px;background:var(--pr-surface-2)" class="d-flex align-items-center justify-content-center"><i class="bi ${m.icon}" style="color:${m.color}"></i></div>`;
  // Heure de diffusion : pertinente pour les épisodes (airDateUtc) — pas pour les sorties
  // ciné/digitales des films (date au niveau du jour uniquement).
  const time = e.type === 'episode'
    ? `<i class="bi bi-clock me-1"></i>${new Date(e.date).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`
    : '';
  return `<div class="d-flex align-items-center gap-3 py-2 ps-2 pe-1" style="border-bottom:1px solid var(--pr-border);border-left:3px solid ${m.color}">
    ${poster}
    <div class="flex-grow-1" style="min-width:0">
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <strong class="text-truncate">${escHtml(e.title)}</strong>
        ${typeBadge}${trackedBadge}${fileBadge}
      </div>
      <div class="text-muted small text-truncate">${escHtml(e.subtitle || '')}${e.instance ? ' · ' + escHtml(e.instance) : ''}</div>
    </div>
    <div class="text-muted small text-nowrap">${time}</div>
  </div>`;
}

function render(events) {
  if (!events.length) {
    return `<div class="text-center text-muted py-5"><i class="bi bi-calendar-x fs-1 d-block mb-2 opacity-25"></i><p class="small">Aucune sortie sur cette période.</p></div>`;
  }
  const byDay = {};
  for (const e of events) {
    const day = e.date.slice(0, 10);
    (byDay[day] = byDay[day] || []).push(e);
  }
  const today = new Date(); today.setHours(0, 0, 0, 0);
  // Date locale (pas toISOString, qui bascule en UTC et peut désigner le mauvais
  // jour) — même logique que dayLabel() pour rester cohérent avec le libellé "Aujourd'hui".
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
  if (!byDay[todayStr]) byDay[todayStr] = []; // ancre toujours presente pour aligner la vue sur aujourd'hui, meme sans sortie ce jour-la
  const days = Object.keys(byDay).sort();
  return days.map(day => `
    <div class="mb-3" ${day === todayStr ? 'id="cal-day-today" style="scroll-margin-top:80px"' : ''}>
      <h6 class="text-warning mb-2">${dayLabel(day)}</h6>
      ${byDay[day].length
        ? `<div class="card p-2">${byDay[day].map(renderEvent).join('')}</div>`
        : `<div class="card p-2 text-center text-muted small py-3">Aucune sortie aujourd'hui.</div>`}
    </div>
  `).join('');
}

function configCallout(title, body, actionLabel = 'Configurer'){
  return `<div class="alert alert-warning d-flex flex-wrap align-items-center justify-content-between gap-3">
    <div><strong>${escHtml(title)}</strong><div class="small mt-1">${escHtml(body)}</div></div>
    <a href="/settings#tab-connexions" class="btn btn-sm btn-warning"><i class="bi bi-gear me-1"></i>${actionLabel}</a>
  </div>`;
}

function initTrackedOnlyFromQuery() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('tracked_only') === 'true') document.getElementById('cal-tracked-only').checked = true;
}

// Le calendrier démarre au lundi de la semaine en cours et affiche ~3 semaines
// vers l'avant par défaut. "Voir le mois précédent/suivant" étend la plage d'un
// mois à chaque clic ; le refresh et la bascule "Suivis uniquement" conservent
// la plage actuellement affichée.
let calendarRangeStart = null;
let calendarRangeEnd = null;

function _currentWeekMonday() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();               // 0 = dimanche, 1 = lundi, ...
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d;
}
function _defaultRangeEnd() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 21);          // même fenêtre avant que la valeur par défaut du serveur
  return d;
}

async function loadCalendar(prependPreviousMonth = false, appendNextMonth = false) {
  if (!calendarRangeStart) calendarRangeStart = _currentWeekMonday();
  if (!calendarRangeEnd) calendarRangeEnd = _defaultRangeEnd();
  if (prependPreviousMonth) {
    calendarRangeStart = new Date(calendarRangeStart);
    calendarRangeStart.setMonth(calendarRangeStart.getMonth() - 1);
  }
  if (appendNextMonth) {
    calendarRangeEnd = new Date(calendarRangeEnd);
    calendarRangeEnd.setMonth(calendarRangeEnd.getMonth() + 1);
  }
  const trackedOnly = document.getElementById('cal-tracked-only').checked;
  const container = document.getElementById('cal-container');
  container.innerHTML = '<div class="text-center text-muted py-5"><span class="spinner-border text-warning"></span></div>';
  const btns = [document.getElementById('cal-prev-month-btn'), document.getElementById('cal-next-month-btn')];
  btns.forEach(b => { if (b) { b.disabled = true; b.querySelector('i')?.classList.add('spin'); } });
  try {
    const params = new URLSearchParams();
    params.set('tracked_only', trackedOnly);
    params.set('start', calendarRangeStart.toISOString());
    params.set('end', calendarRangeEnd.toISOString());
    const caps = await fetch('/api/arr/capabilities').then(r => r.ok ? r.json() : {});
    if (!caps.has_sonarr && !caps.has_radarr) {
      const disabled = caps.sonarr_disabled || caps.radarr_disabled;
      container.innerHTML = configCallout(
        disabled ? 'Calendrier desactive.' : 'Calendrier non configure.',
        disabled
          ? 'Une instance Sonarr ou Radarr existe, mais elle est desactivee. Activez-la pour afficher les sorties.'
          : 'Ajoutez au moins une instance Sonarr ou Radarr active pour afficher les sorties.',
        disabled ? 'Activer' : 'Configurer'
      );
      return;
    }
    const events = await fetch(`/api/calendar?${params.toString()}`).then(r => { if (!r.ok) throw new Error('Calendrier Sonarr/Radarr inaccessible'); return r.json(); });
    container.innerHTML = render(events);
    document.getElementById('cal-updated').textContent = 'Maj ' + new Date().toLocaleTimeString('fr-FR');
    // Aligne la vue sur aujourd'hui, sauf quand l'utilisateur vient d'étendre la plage
    // vers un mois précédent/suivant (il navigue volontairement ailleurs).
    if (!prependPreviousMonth && !appendNextMonth) {
      document.getElementById('cal-day-today')?.scrollIntoView({ block: 'start', behavior: 'instant' });
    }
  } catch (e) {
    container.innerHTML = configCallout(
      'Calendrier inaccessible.',
      `${e.message || 'Erreur de chargement'}. Verifiez les connexions Sonarr/Radarr.`
    );
  } finally {
    btns.forEach(b => { if (b) { b.disabled = false; b.querySelector('i')?.classList.remove('spin'); } });
  }
}

initTrackedOnlyFromQuery();
loadCalendar();
</script>
{% endblock %}
