<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — Plexarr</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23e5a00d'/%3E%3Cpolygon points='13,9 25,16 13,23' fill='%23141414'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    .bg-blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #e5a00d, transparent 70%);
      top: -200px; left: -200px;
      animation-duration: 14s;
    }
    .bg-blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #c84b11, transparent 70%);
      bottom: -150px; right: -150px;
      animation-duration: 10s;
      animation-delay: -5s;
    }
    .bg-blob-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #0d6efd55, transparent 70%);
      bottom: 30%; left: 10%;
      animation-duration: 18s;
      animation-delay: -3s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(30, 30, 30, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow:
        0 0 0 1px rgba(229, 160, 13, 0.06),
        0 24px 60px rgba(0,0,0,.6);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .brand-logo .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #e5a00d, #c8860d);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(229, 160, 13, .35);
    }
    .brand-logo .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .brand-logo .logo-text span {
      color: #e5a00d;
    }

    .login-subtitle {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 32px;
      font-weight: 400;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .input-group-custom {
      position: relative;
      margin-bottom: 18px;
    }
    .input-group-custom .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-size: 15px;
      pointer-events: none;
      transition: color .2s;
      z-index: 2;
    }
    .input-group-custom .form-control {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: #fff;
      padding: 12px 14px 12px 40px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .input-group-custom .form-control:focus {
      background: rgba(255,255,255,.07);
      border-color: #e5a00d;
      box-shadow: 0 0 0 3px rgba(229, 160, 13, .15);
      outline: none;
    }
    .input-group-custom .form-control:focus + .input-icon,
    .input-group-custom:focus-within .input-icon {
      color: #e5a00d;
    }
    .input-group-custom .form-control::placeholder { color: #444; }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
      font-size: 15px;
      cursor: pointer;
      padding: 0;
      z-index: 2;
      transition: color .2s;
    }
    .toggle-pw:hover { color: #e5a00d; }

    .btn-login {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #e5a00d, #c8860d);
      color: #111;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(229, 160, 13, .3);
      margin-top: 8px;
    }
    .btn-login:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(229, 160, 13, .4);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .alert-error {
      background: rgba(220, 53, 69, .12);
      border: 1px solid rgba(220, 53, 69, .3);
      border-radius: 10px;
      color: #f87171;
      padding: 12px 16px;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: shake .4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.78rem;
      color: #3a3a3a;
    }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Brand -->
      <div class="brand-logo">
        <div class="logo-icon">
          <i class="bi bi-collection-play-fill" style="color:#141414"></i>
        </div>
        <div class="logo-text">Plex<span>arr</span></div>
      </div>
      <p class="login-subtitle">Connectez-vous pour accéder au tableau de bord</p>

      <!-- Error alert -->
      {% if error %}
      <div class="alert-error" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <!-- Login form -->
      <form method="post" action="/login" id="login-form" autocomplete="on">
        <input type="hidden" name="next" value="{{ next }}">

        <div>
          <label class="form-label" for="username">Nom d'utilisateur</label>
          <div class="input-group-custom">
            <i class="bi bi-person-fill input-icon"></i>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              placeholder="Entrez votre identifiant"
              autocomplete="username"
              required
              autofocus
            >
          </div>
        </div>

        <div>
          <label class="form-label" for="password">Mot de passe</label>
          <div class="input-group-custom">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              style="padding-right: 42px;"
            >
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Afficher le mot de passe">
              <i class="bi bi-eye-fill" id="toggle-pw-icon"></i>
            </button>
          </div>
        </div>

        <div>
          <label class="form-label" for="otp_code">Code 2FA</label>
          <div class="input-group-custom">
            <i class="bi bi-shield-lock-fill input-icon"></i>
            <input
              type="text"
              id="otp_code"
              name="otp_code"
              class="form-control"
              placeholder="123456"
              autocomplete="one-time-code"
              inputmode="numeric"
              pattern="[0-9 ]{6,12}"
            >
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
      </form>

      <div style="display:flex;align-items:center;gap:12px;margin:22px 0 18px;color:#444;font-size:.75rem">
        <span style="flex:1;height:1px;background:rgba(255,255,255,.08)"></span>OU<span style="flex:1;height:1px;background:rgba(255,255,255,.08)"></span>
      </div>

      <button type="button" class="btn-login" id="btn-plex" style="background:linear-gradient(135deg,#e5a00d,#cc7b19);color:#111">
        <i class="bi bi-collection-play-fill me-2"></i>Se connecter avec Plex
      </button>
      <button type="button" class="btn-login mt-2" id="btn-passkey" style="background:#222;border:1px solid rgba(255,255,255,0.15);color:#fff" onclick="loginWithPasskey()">
        <i class="bi bi-fingerprint me-2 text-warning"></i>Se connecter avec une Passkey
      </button>
      <p id="plex-status" style="text-align:center;color:#888;font-size:.8rem;margin-top:12px;min-height:1rem"></p>
    </div>

    <div class="login-footer">
      Plexarr &copy; 2025
    </div>
  </div>

  <script>
    // Toggle password visibility
    const toggleBtn = document.getElementById('toggle-pw');
    const pwInput   = document.getElementById('password');
    const pwIcon    = document.getElementById('toggle-pw-icon');
    toggleBtn.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      pwIcon.className = isHidden ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill';
    });

    // Disable submit button on submit to prevent double-click
    document.getElementById('login-form').addEventListener('submit', () => {
      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connexion…';
    });

    // Connexion Plex SSO : ouvre une popup vers Plex, puis interroge le backend.
    const NEXT = new URLSearchParams(location.search).get('next') || '/';
    const plexBtn = document.getElementById('btn-plex');
    const plexStatus = document.getElementById('plex-status');
    let _pollTimer = null;

    plexBtn.addEventListener('click', async () => {
      plexBtn.disabled = true;
      plexStatus.textContent = 'Ouverture de Plex…';
      try {
        const r = await fetch('/login/plex/pin', { method: 'POST' });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || 'Erreur Plex');
        const { id, auth_url } = await r.json();
        const popup = window.open(auth_url, 'plexAuth', 'width=600,height=720');
        plexStatus.textContent = 'Validez la connexion dans la fenêtre Plex…';

        let elapsed = 0;
        _pollTimer = setInterval(async () => {
          elapsed += 2;
          if (elapsed > 180 || (popup && popup.closed && elapsed > 4)) {
            clearInterval(_pollTimer);
            plexBtn.disabled = false;
            plexStatus.textContent = popup && popup.closed ? 'Fenêtre fermée.' : 'Délai dépassé.';
            return;
          }
          try {
            const c = await fetch('/login/plex/check/' + id);
            if (c.status === 403) {
              clearInterval(_pollTimer);
              plexStatus.textContent = (await c.json()).detail || 'Compte non autorisé.';
              return;
            }
            if (!c.ok) return;
            const d = await c.json();
            if (d.authenticated) {
              clearInterval(_pollTimer);
              if (popup && !popup.closed) popup.close();
              plexStatus.textContent = 'Connecté ! Redirection…';
              location.href = NEXT.startsWith('/') ? NEXT : '/';
            }
          } catch (e) { /* réseau transitoire, on réessaie */ }
        }, 2000);
      } catch (e) {
        plexBtn.disabled = false;
        plexStatus.textContent = 'Erreur : ' + e.message;
      }
    });

    async function loginWithPasskey() {
      const btn = document.getElementById('btn-passkey');
      const origText = btn.innerHTML;
      btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Attente de la Passkey…';
      try {
        const options = await fetch('/api/webauthn/login/options', { method: 'POST' }).then(r => r.json());
        options.challenge = bufferDecode(options.challenge);
        if (options.allowCredentials) {
          for (let i = 0; i < options.allowCredentials.length; i++) {
            options.allowCredentials[i].id = bufferDecode(options.allowCredentials[i].id);
          }
        }
        
        const assertion = await navigator.credentials.get({ publicKey: options });
        const assertionForServer = {
          id: assertion.id,
          rawId: bufferEncode(assertion.rawId),
          type: assertion.type,
          response: {
            clientDataJSON: bufferEncode(assertion.response.clientDataJSON),
            authenticatorData: bufferEncode(assertion.response.authenticatorData),
            signature: bufferEncode(assertion.response.signature),
            userHandle: assertion.response.userHandle ? bufferEncode(assertion.response.userHandle) : null
          }
        };

        const verifyResp = await fetch('/api/webauthn/login/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(assertionForServer)
        });
        const result = await verifyResp.json();
        if (!verifyResp.ok) throw new Error(result.detail || "Validation échouée");

        plexStatus.textContent = 'Connecté ! Redirection…';
        location.href = NEXT.startsWith('/') ? NEXT : '/';
      } catch (e) {
        plexStatus.textContent = 'Erreur Passkey : ' + e.message;
      } finally {
        btn.disabled = false; btn.innerHTML = origText;
      }
    }

    function bufferDecode(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
      const pad = base64.length % 4;
      const padded = pad ? base64 + "=".repeat(4 - pad) : base64;
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    function bufferEncode(value) {
      const bytes = new Uint8Array(value);
      let binary = "";
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      const base64 = btoa(binary);
      return base64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
    }
  </script>
</body>
</html>
